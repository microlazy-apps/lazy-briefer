name: Bootstrap appstore (manual)

# Build all 6 service images + lpk, then run lazycat-ci's bootstrap.
# Bootstrap is one-way (locks app id + icon + screenshots) so this
# workflow is dispatched by hand only — the user verifies the lpk
# installs cleanly on a real box first.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to embed (e.g. 0.2.0)"
        required: true
        default: "0.2.0"
      app_id:
        description: "Existing app_id (skip /app/create on retry)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/lpk-multi-build.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit

  bootstrap:
    needs: build
    uses: microlazy-apps/lazycat-ci/.github/workflows/bootstrap.yml@v0.1.0
    with:
      version: ${{ inputs.version }}
      app_id:  ${{ inputs.app_id }}
    secrets: inherit
