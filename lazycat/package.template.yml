package: cloud.lazycat.app.briefer
version: ${VERSION}
name: Briefer
description: 一站式数据笔记本 + 仪表盘 — 写代码或拖拽都能用，自托管开源 BI
author: briefercloud
license: AGPL-3.0
homepage: https://github.com/microlazy-apps/lazy-briefer
locales:
  zh-CN:
    name: Briefer 数据笔记本
    description: 自托管 Briefer —— Notion 风格的数据笔记本 + 仪表盘，AI 助手支持任意 OpenAI 兼容服务
    usage: |
      ## 关于 Briefer

      Briefer 是开源版的「数据笔记本 + 仪表盘」一体工具，做的事情类似
      Hex / Deepnote / Mode，完全自托管：

      - **类 Notion 的笔记本** —— 富文本 + 可执行 Python / SQL
      - **可视化仪表盘** —— 从笔记本结果直接拼出仪表盘并分享
      - **数据源连接** —— PostgreSQL / MySQL / BigQuery / Athena /
        Redshift / Databricks / Oracle / CSV
      - **AI 助手**（可选）—— SQL/Python 自动补全、修复，支持任意
        OpenAI 兼容服务

      ## 安装后访问

      `https://briefer.{你的微服域名}` 打开 Web UI，**首次进入会引导
      创建管理员账号 + 工作区**。

      ## AI 功能 — 任意 OpenAI 兼容服务（per-workspace 配置）

      在每个工作区的 **Settings → AI** 里独立填三项：

      - **Assistant model** —— 模型名（自由输入：`gpt-4o` /
        `deepseek-chat` / `qwen-plus` / `llama3.2` 等）
      - **AI API Base URL** —— Endpoint。留空走 OpenAI 官方；或填
        `https://api.deepseek.com/v1` / 通义千问 dashscope /
        SiliconFlow / OpenRouter / 本地 Ollama (`http://host.docker.internal:11434/v1`) /
        本地 vLLM 等
      - **OpenAI API Key** —— 服务商的 key（加密存储）
      - **Test AI connection** —— 一键发一次最小请求验证三项配置

      不配置 AI 也能正常用笔记本、仪表盘、SQL 编辑器、数据连接所有非 AI 功能。

      > 部分服务商（DeepSeek / 通义千问 / Ollama 等）没有
      > `/v1/embeddings` 端点。本应用已做兼容：schema 索引和 SQL AI
      > 自动降级到 full-schema 模式，不会因 embedding 失败而崩溃。

      ## 数据持久化

      - `/lzcapp/var/persist/postgres/`  —— Briefer 自己的 Postgres 数据
      - `/lzcapp/var/persist/jupyter/`   —— 笔记本里上传的文件、Jupyter 状态
      - `/lzcapp/var/persist/briefer/`   —— 应用配置

      所有 JWT / 加密密钥由 LazyCat 的 `stable_secret` 派生，重装不会
      丢数据。

      ## 资源占用

      已拆分为 6 个独立服务：postgres / jupyter / ai / api / web / nginx。
      首次安装时各镜像并行拉取，单个镜像在 200MB ~ 1.2GB 之间。运行
      内存 ≥ 2GB 推荐。

      升级时只有改动过的服务镜像会重新拉取，其它从本地缓存复用。
  en:
    name: Briefer Data Notebooks
    description: Self-hosted Briefer — Notion-style data notebooks + dashboards, AI assistant supports any OpenAI-compatible provider
    usage: |
      ## About Briefer

      Briefer is an open-source data notebook + dashboard tool — like
      Hex / Deepnote / Mode but self-hostable. One Web UI gives you:

      - **Notion-style notebooks** with executable Python / SQL cells
      - **Dashboards** built directly from notebook outputs
      - **Data source connectors** — PostgreSQL / MySQL / BigQuery /
        Athena / Redshift / Databricks / Oracle / CSV
      - **AI assistant** (optional) — SQL/Python edit + fix, works with
        any OpenAI-compatible provider

      ## Access

      Open `https://briefer.{your-box-domain}`. First visit walks you
      through creating an admin account + workspace.

      ## AI — any OpenAI-compatible provider (per-workspace)

      Configure each workspace under **Settings → AI**:

      - **Assistant model** — free-text input (`gpt-4o`,
        `deepseek-chat`, `qwen-plus`, `llama3.2`, …)
      - **AI API Base URL** — endpoint. Leave blank for OpenAI; or
        DeepSeek / Qwen DashScope / SiliconFlow / OpenRouter / local
        Ollama / local vLLM
      - **OpenAI API Key** — provider key, encrypted at rest
      - **Test AI connection** — one-click smoke-test of the combo

      Skipping AI is fine — notebooks, dashboards, SQL editor, and data
      connections all work without it.

      > Some OpenAI-compatible providers (DeepSeek, Qwen, Ollama) don't
      > implement `/v1/embeddings`. The wrapper handles this gracefully:
      > schema indexing + SQL AI fall back to full-schema mode when
      > embeddings 404.

      ## Persistent storage

      - `/lzcapp/var/persist/postgres/` — Briefer's internal Postgres
      - `/lzcapp/var/persist/jupyter/`  — uploaded files + Jupyter state
      - `/lzcapp/var/persist/briefer/`  — app config

      All JWT / encryption keys are derived from LazyCat `stable_secret`
      so reinstalling preserves encrypted data.

      ## Resource footprint

      Split into 6 services: postgres / jupyter / ai / api / web /
      nginx. Pulls happen in parallel on first install; individual
      image sizes range from ~200MB to ~1.2GB. ≥ 2GB RAM recommended.

      On upgrade only the changed service images re-pull; everything
      else is reused from the local cache.
