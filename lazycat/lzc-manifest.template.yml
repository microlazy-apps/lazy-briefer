application:
  subdomain: briefer
  upstreams:
    - location: /
      backend: http://main:3000
  public_path:
    - /
  health_check:
    test_url: http://main:3000/
    timeout: 10s
    # First boot does initdb + ~50 prisma migrations + Jupyter venv +
    # AI venv warm-up. 10 min start_period prevents lazycat from
    # erroring out and killing the container mid-init.
    start_period: 600s

services:
  main:
    image: ${LAZYCAT_IMAGE}
    environment:
      - TZ=Asia/Shanghai

      # Force UTF-8 locale everywhere. Default node:18-slim ships C
      # locale, so any Python kernel / sql output containing non-ASCII
      # bytes (Chinese, emoji, ...) crashes with
      # "'ascii' codec can't decode byte 0xe6 ...". Set the locale on
      # the supervisord parent so jupyter / api / ai / web all inherit.
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PYTHONIOENCODING=utf-8

      # OpenAI-compatible API config — only required for the AI chat /
      # SQL-helper features. Leave blank to install briefer without AI;
      # the rest of the app (notebooks, dashboards, postgres, jupyter)
      # still works.
      #
      # langchain_openai picks up OPENAI_BASE_URL / OPENAI_API_BASE
      # automatically (env-var version varies between versions; we set
      # both for safety). Users can point this at OpenAI / Azure /
      # DeepSeek / Qwen / Ollama / vLLM / OpenRouter / ... — any
      # OpenAI-compatible endpoint.
      - OPENAI_API_KEY={{.U.OPENAI_API_KEY}}
      - OPENAI_BASE_URL={{.U.OPENAI_BASE_URL}}
      - OPENAI_API_BASE={{.U.OPENAI_BASE_URL}}
      - OPENAI_DEFAULT_MODEL_NAME={{.U.OPENAI_DEFAULT_MODEL_NAME}}

      # Briefer's setup.py auto-generates these on first boot if missing,
      # but pinning them via stable_secret keeps them deterministic across
      # container restarts and survives /home/briefer/.config wipes.
      - LOGIN_JWT_SECRET={{stable_secret "BRIEFER_LOGIN_JWT_SECRET"}}
      - AUTH_JWT_SECRET={{stable_secret "BRIEFER_AUTH_JWT_SECRET"}}
      - JUPYTER_TOKEN={{stable_secret "BRIEFER_JUPYTER_TOKEN"}}
      - AI_BASIC_AUTH_USERNAME={{stable_secret "BRIEFER_AI_AUTH_USERNAME"}}
      - AI_BASIC_AUTH_PASSWORD={{stable_secret "BRIEFER_AI_AUTH_PASSWORD"}}
      - ENVIRONMENT_VARIABLES_ENCRYPTION_KEY={{stable_secret "BRIEFER_ENV_VARS_KEY"}}
      - WORKSPACE_SECRETS_ENCRYPTION_KEY={{stable_secret "BRIEFER_WORKSPACE_KEY"}}
      - DATASOURCES_ENCRYPTION_KEY={{stable_secret "BRIEFER_DATASOURCES_KEY"}}

      # Prisma connection pool. Default (10 / 5s) gets exhausted as soon
      # as the schema explorer crawls a real data source — every worker
      # competes with internal lock-extension queries. Bump to a value
      # that survives ~30 concurrent schema queries.
      - POSTGRES_CONNECTION_LIMIT=50
      - POSTGRES_POOL_TIMEOUT=30
    binds:
      # postgres data — pgvector tables, app metadata
      - /lzcapp/var/persist/postgres:/var/lib/postgresql/data
      # jupyter user home — uploaded files, notebook state
      - /lzcapp/var/persist/jupyter:/home/jupyteruser
      # briefer app config (api/web)
      - /lzcapp/var/persist/briefer:/home/briefer/.config/briefer
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Match the application-level start_period so docker's own
      # healthcheck does not flap during the long first boot.
      start_period: 600s
